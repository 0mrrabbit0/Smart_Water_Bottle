<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLED Display Simulator - Smart Water Bottle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .oled-container {
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border-radius: 15px;
            padding: 40px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        #oled-canvas {
            background: #000;
            border: 3px solid #1a1a1a;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.active {
            background: linear-gradient(145deg, #f093fb, #f5576c);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .info-panel {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .info-panel h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-item label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .info-item value {
            display: block;
            color: #333;
            font-size: 16px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            color: #999;
            margin-top: 20px;
            font-size: 12px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 OLED Display Simulator</h1>
        <p class="subtitle">Smart Water Bottle - SSD1306 128x64 Display</p>

        <div class="oled-container">
            <canvas id="oled-canvas" width="128" height="64"></canvas>
        </div>

        <div class="controls">
            <button class="btn active" onclick="setMode('normal')">正常模式</button>
            <button class="btn" onclick="setMode('unlock_digit')">解锁数字</button>
            <button class="btn" onclick="setMode('unlock_prompt')">解锁提示</button>
            <button class="btn" onclick="setMode('alarm')">报警模式</button>
            <button class="btn" onclick="setMode('locked')">锁定模式</button>
        </div>

        <div class="info-panel">
            <h3>📊 Display Information <span class="status-indicator"></span></h3>
            <div class="info-grid">
                <div class="info-item">
                    <label>Resolution</label>
                    <value>128 x 64 pixels</value>
                </div>
                <div class="info-item">
                    <label>Display Type</label>
                    <value>Monochrome OLED</value>
                </div>
                <div class="info-item">
                    <label>Controller</label>
                    <value>SSD1306</value>
                </div>
                <div class="info-item">
                    <label>Current Mode</label>
                    <value id="current-mode">Normal</value>
                </div>
            </div>
        </div>

        <div class="footer">
            STM32F103C8T6 Smart Water Bottle Project | OLED Simulator v1.0
        </div>
    </div>

    <script>
        const canvas = document.getElementById('oled-canvas');
        const ctx = canvas.getContext('2d');
        const scale = 4; // Scale factor for better visibility

        // Scale canvas for retina displays
        canvas.style.width = (128 * scale) + 'px';
        canvas.style.height = (64 * scale) + 'px';

        let currentMode = 'normal';

        // Font configurations (approximate pixel sizes for 6x8 and 8x16 fonts)
        const fonts = {
            12: '10px "Courier New", monospace',  // Simulates 6x8 font
            16: '14px "Courier New", monospace'   // Simulates 8x16 font
        };

        function clearDisplay() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 128, 64);
        }

        function drawText(text, x, y, size) {
            ctx.fillStyle = '#FFFFFF';
            ctx.font = fonts[size] || fonts[12];
            ctx.textBaseline = 'top';
            ctx.fillText(text, x, y);
        }

        function drawBatteryIcon(capacity) {
            const x = 110;
            const y = 0;
            const width = 14;
            const height = 8;
            const terminalWidth = 2;
            const terminalHeight = 4;

            ctx.strokeStyle = '#FFFFFF';
            ctx.fillStyle = '#FFFFFF';
            ctx.lineWidth = 1;

            // Draw outer frame
            ctx.strokeRect(x, y, width, height);

            // Draw positive terminal
            ctx.fillRect(x + width, y + 2, terminalWidth, terminalHeight);

            // Draw inner fill based on capacity
            const fillWidth = Math.floor((width - 4) * capacity / 100);
            if (fillWidth > 0) {
                ctx.fillRect(x + 2, y + 2, fillWidth, height - 4);
            }

            // Draw capacity percentage text below battery
            drawText(capacity + '%', x - 2, y + height + 1, 12);
        }

        async function updateDisplay() {
            try {
                const response = await fetch('/api/display_data');
                const data = await response.json();

                clearDisplay();

                if (data.lines) {
                    data.lines.forEach(line => {
                        drawText(line.text, line.x, line.y, line.size);
                    });
                }

                // Draw battery icon in top-right corner for all modes
                if (data.battery_capacity !== undefined) {
                    drawBatteryIcon(data.battery_capacity);
                }
            } catch (error) {
                console.error('Error updating display:', error);
            }
        }

        async function setMode(mode) {
            try {
                const response = await fetch(`/api/set_mode/${mode}`);
                const data = await response.json();

                if (data.success) {
                    currentMode = mode;
                    document.getElementById('current-mode').textContent =
                        mode.charAt(0).toUpperCase() + mode.slice(1).replace('_', ' ');

                    // Update button styles
                    document.querySelectorAll('.btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    event.target.classList.add('active');

                    updateDisplay();
                }
            } catch (error) {
                console.error('Error setting mode:', error);
            }
        }

        async function updateTime() {
            try {
                await fetch('/api/update_time');
                if (currentMode === 'normal' || currentMode === 'locked') {
                    updateDisplay();
                }
            } catch (error) {
                console.error('Error updating time:', error);
            }
        }

        // Initial display update
        updateDisplay();

        // Update time every second
        setInterval(updateTime, 1000);

        // Refresh display every 200ms for smooth updates
        setInterval(updateDisplay, 200);
    </script>
</body>
</html>
